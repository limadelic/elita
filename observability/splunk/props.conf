# Field extraction and parsing for elita session logs
# Location: $SPLUNK_HOME/etc/apps/elita_session/local/props.conf
# Search-time field extraction for canonical routing format (c704f1a+):
#   🤔 sender → target | message  (ask)
#   📢 sender → target | message  (tell)
#   ✨ receiver | message        (reply)

[elita_session]
# Timestamp format: lines without timestamp are considered continuation
DATETIME_CONFIG = CURRENT

# Handle multi-line events - boot events and regular logs are single line
SHOULD_LINEMERGE = false

# Search-time field extraction - no anchors, matches anywhere in event
# Extract ask routing events: 🤔 sender → target | message
EXTRACT-ask = 🤔\s+(?<sender>[^→\n]+?)\s+→\s+(?<target>[^|\n]+?)\s+\|\s+(?<message>[^\n]+)

# Extract tell routing events: 📢 sender → target | message
EXTRACT-tell = 📢\s+(?<sender>[^→\n]+?)\s+→\s+(?<target>[^|\n]+?)\s+\|\s+(?<message>[^\n]+)

# Extract reply routing events: ✨ receiver | message
EXTRACT-reply = ✨\s+(?<receiver>[^|\n]+?)\s+\|\s+(?<message>[^\n]+)

# Extract agent and pid from filename {name}_{pid}.log
EXTRACT-agent_pid = (?<agent>[^/]+)_(?<pid>\d+)\.log$

# Add kind field based on emoji marker
EVAL-kind = case(match(_raw,"🤔.*→.*\|"),"ask", match(_raw,"📢.*→.*\|"),"tell", match(_raw,"✨.*\|"),"reply", 1=1, "other")
