# Field extraction and parsing for elita session logs
# Location: $SPLUNK_HOME/etc/apps/elita_session/local/props.conf
# Extracts canonical routing format (c704f1a+):
#   🤔 sender → target | message  (ask)
#   📢 sender → target | message  (tell)
#   ✨ receiver | message        (reply)

[elita_session]
# Timestamp format: lines without timestamp are considered continuation
DATETIME_CONFIG = CURRENT

# Handle multi-line events - boot events and regular logs are single line
SHOULD_LINEMERGE = false

# Extract fields from canonical routing events via transforms
TRANSFORMS-extract_ask = extract_ask_routing
TRANSFORMS-extract_tell = extract_tell_routing
TRANSFORMS-extract_reply = extract_reply_routing
TRANSFORMS-extract_agent_pid = extract_agent_pid
TRANSFORMS-add_kind = add_routing_kind
