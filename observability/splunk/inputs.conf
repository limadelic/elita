# Monitor input for elita session logs
# Location: $SPLUNK_HOME/etc/apps/elita_session/local/inputs.conf

[monitor:/Users/mike/.elita/sessions/*.log]
disabled = false
index = elita
sourcetype = elita_session
crcSalt = <SOURCE>
followTail = 0

# Default settings for all inputs
[default]
host = localhost
source_key = source
