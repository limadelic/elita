# Field transformations and extractions for elita session logs
# Location: $SPLUNK_HOME/etc/apps/elita_session/local/transforms.conf
# Canonical routing format (c704f1a+):
#   🤔 sender → target | message  (ask)
#   📢 sender → target | message  (tell)
#   ✨ receiver | message        (reply)

# Extract ask routing events: 🤔 sender → target | message
# Creates searchable fields: sender, target, message, kind
[extract_ask_routing]
REGEX = ^🤔\s+(?<sender>[^→]+)\s+→\s+(?<target>[^|]+)\s+\|\s+(?<message>.+)$
FORMAT = sender::$1 target::$2 message::$3 kind::ask

# Extract tell routing events: 📢 sender → target | message
# Creates searchable fields: sender, target, message, kind
[extract_tell_routing]
REGEX = ^📢\s+(?<sender>[^→]+)\s+→\s+(?<target>[^|]+)\s+\|\s+(?<message>.+)$
FORMAT = sender::$1 target::$2 message::$3 kind::tell

# Extract reply routing events: ✨ receiver | message
# Creates searchable fields: receiver, message, kind
[extract_reply_routing]
REGEX = ^✨\s+(?<receiver>[^|]+)\s+\|\s+(?<message>.+)$
FORMAT = receiver::$1 message::$2 kind::reply

# Extract agent and pid from filename {name}_{pid}.log
# Creates searchable fields: agent, pid
[extract_agent_pid]
REGEX = ([^/]+)_(\d+)\.log$
SOURCE_KEY = source
FORMAT = agent::$1 pid::$2
