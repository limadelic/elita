# Field transformations and extractions for elita session logs
# Location: $SPLUNK_HOME/etc/apps/elita_session/local/transforms.conf

# Extract ask routing events: 🤔 sender → target | message
[extract_ask_routing]
REGEX = ^🤔\s+(?<sender>[^→]+)\s+→\s+(?<target>[^|]+)\s+\|\s+(?<message>.+)$
DEST_KEY = queue
FORMAT = $0
SOURCE_KEY = _raw

# Fallback for ask events with different format
[extract_ask_fallback]
REGEX = ^🤔\s+(?<event_type>gather|prepare|ask):\s+(?<event_detail>.+)$
DEST_KEY = _MetaData:Transformation
FORMAT = ask_event

# Extract tell routing events: 📢 sender → target | message
[extract_tell_routing]
REGEX = ^📢\s+(?<sender>[^→]+)\s+→\s+(?<target>[^|]+)\s+\|\s+(?<message>.+)$
DEST_KEY = queue
FORMAT = $0
SOURCE_KEY = _raw

# Fallback for tell events with different format
[extract_tell_fallback]
REGEX = ^📢\s+(?<event_type>broadcast|send):\s+(?<event_detail>.+)$
DEST_KEY = _MetaData:Transformation
FORMAT = tell_event

# Extract reply routing events: ✨ receiver | message
[extract_reply_routing]
REGEX = ^✨\s+(?<receiver>[^|]+)\s+\|\s+(?<message>.+)$
DEST_KEY = queue
FORMAT = $0
SOURCE_KEY = _raw

# Extract agent and pid from filename {name}_{pid}.log
[extract_agent_pid]
REGEX = (?<agent>[^/]+)_(?<pid>\d+)\.log
SOURCE_KEY = source
DEST_KEY = _MetaData:Transformation
FORMAT = $1_$2

# Add event kind field based on emoji
[add_routing_kind_ask]
REGEX = ^🤔
DEST_KEY = _raw
FORMAT = kind=ask $0

[add_routing_kind_tell]
REGEX = ^📢
DEST_KEY = _raw
FORMAT = kind=tell $0

[add_routing_kind_reply]
REGEX = ^✨
DEST_KEY = _raw
FORMAT = kind=reply $0
