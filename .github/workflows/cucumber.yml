name: Cucumber Tests

on:
  push:
    branches:
      - qa
      - wip
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Lint el
        run: |
          cd apps/el
          mix deps.get
          mix lint

      - name: Lint elita
        run: |
          cd apps/elita
          mix deps.get
          mix lint

      - name: Check Gherkin formatting
        run: |
          npm install
          npm run fmt:check

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build el escript
        run: |
          cd apps/el
          mix deps.get
          mix escript.build

      - name: Prepare elita
        run: |
          cd apps/elita
          mix deps.get
          mix compile

      - name: Run Cucumber tests
        run: |
          mkdir -p reports
          TAPE=replay bundle exec cucumber --format html --out reports/cucumber.html --format json --out reports/cucumber.json --publish-quiet
        env:
          MIX_ENV: test

      - name: Inject legend into report
        run: |
          ruby bin/inject_legend.rb reports/cucumber.html
        if: always()

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: reports/

      - name: Compute badge counts
        run: |
          mkdir -p site
          ruby << 'RUBY'
            require 'json'
            data = JSON.parse(File.read('reports/cucumber.json'))
            scenarios = data.flat_map { |f| f['elements'] || [] }
            passed = scenarios.count { |sc| (sc['steps'] || []).all? { |s| s.dig('result','status') == 'passed' } }
            total = scenarios.length
            color = passed == total ? '23D96C' : 'e05d44'
            badge = {
              schemaVersion: 1,
              label: 'cukes',
              message: "#{passed}/#{total}",
              color: color,
              namedLogo: 'cucumber',
              logoColor: 'white',
              labelColor: '173647'
            }
            File.write('site/cukes.json', JSON.generate(badge))
          RUBY
        if: always()

      - name: Create site directory
        run: |
          mkdir -p site
          cp reports/cucumber.html site/index.html
        if: always()

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-site
          path: site/

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build el escript
        run: |
          cd apps/el
          mix deps.get
          mix escript.build

      - name: Prepare elita
        run: |
          cd apps/elita
          mix deps.get
          mix compile

      - name: Run Cucumber with coverage
        run: |
          COVER=1 TAPE=replay bundle exec cucumber --publish-quiet 2>&1 | tee coverage.log
        env:
          MIX_ENV: test
        continue-on-error: true

      - name: Analyze coverage
        run: |
          mkdir -p cover
          elixir bin/analyze_coverage.exs
        continue-on-error: true

      - name: Generate coverage badge
        run: |
          mkdir -p site
          ruby << 'RUBY'
            begin
              require 'json'
              total_pct = 0.0

              if File.exist?('cover/index.html')
                content = File.read('cover/index.html')
                if content =~ /<p><strong>Total: ([\d.]+)%<\/strong><\/p>/
                  total_pct = $1.to_f
                end
              end

              color = case total_pct
                      when 0..24 then 'e05d44'
                      when 25..59 then 'fe7d37'
                      else '23D96C'
                      end

              badge = {
                schemaVersion: 1,
                label: 'coverage',
                message: "#{total_pct}%",
                color: color
              }

              File.write('site/coverage.json', JSON.generate(badge))
              puts "Coverage badge: #{total_pct}% (#{color})"
            rescue => e
              puts "Warning: Could not generate coverage badge: #{e.message}"
            end
          RUBY
        continue-on-error: true

      - name: Prepare coverage site
        run: |
          mkdir -p site/coverage
          cp -r cover/* site/coverage/ 2>/dev/null || true
          if [ -f site/coverage.json ]; then
            cp site/coverage.json site/
          fi
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-site
          path: site/
        continue-on-error: true

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [test]
    if: always()

    steps:
      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: test-site
          path: site

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-site
          path: site
        continue-on-error: true

      - name: Add coverage link to report
        run: |
          if [ -f site/index.html ] && [ -d site/coverage ]; then
            sed -i 's|</body>|<hr><p><a href="coverage/">Coverage Report</a> | <a href="coverage.json">Badge</a></p></body>|' site/index.html
          fi
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
