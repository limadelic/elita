name: Cucumber Tests

on:
  push:
    branches:
      - qa
      - wip
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - name: Lint el
        run: |
          cd apps/el
          mix deps.get
          mix lint

      - name: Lint elita
        run: |
          cd apps/elita
          mix deps.get
          mix lint

  test:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build el escript
        run: |
          cd apps/el
          mix deps.get
          mix escript.build

      - name: Prepare elita
        run: |
          cd apps/elita
          mix deps.get
          mix compile

      - name: Run Cucumber tests
        run: |
          mkdir -p reports
          TAPE=replay bundle exec cucumber --format html --out reports/cucumber.html --format json --out reports/cucumber.json --publish-quiet
        env:
          MIX_ENV: test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: reports/

      - name: Setup Pages
        uses: actions/configure-pages@v4
        if: always()

      - name: Compute badge counts
        run: |
          mkdir -p site
          ruby << 'RUBY'
            require 'json'
            data = JSON.parse(File.read('reports/cucumber.json'))
            passed = data.count { |scenario| scenario['steps'].all? { |s| s['result']['status'] == 'passed' } }
            total = data.length
            color = passed == total ? '23D96C' : 'e05d44'
            badge = {
              schemaVersion: 1,
              label: 'cukes',
              message: "#{passed}/#{total}",
              color: color,
              namedLogo: 'cucumber',
              logoColor: 'white',
              labelColor: '173647'
            }
            File.write('site/cukes.json', JSON.generate(badge))
          RUBY
        if: always()

      - name: Create site directory
        run: |
          mkdir -p site
          cp reports/cucumber.html site/index.html
          cp -r reports/coverage site/ || true
        if: always()

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: always()
