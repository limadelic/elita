name: Cukes

on: workflow_call

permissions:
  contents: write
  pull-requests: write

jobs:
  cukes:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Get dependencies
        run: mix deps.get

      - name: Build el escript
        run: |
          cd apps/el
          mix escript.build

      - name: Prepare elita
        run: |
          cd apps/elita
          mix compile

      - name: Run Cucumber tests
        id: cukes
        run: |
          mkdir -p reports
          TAPE=replay mix cukes --format html --out reports/cucumber.html --format json --out reports/cucumber.json --publish-quiet
        env:
          MIX_ENV: test

      - name: Inject legend into report
        run: |
          ruby ops/ci/inject_legend.rb reports/cucumber.html
        if: always()

      - name: Upload Cucumber report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cukes-report-${{ github.run_id }}
          path: reports/

      - name: Sanitize branch name for artifact
        id: branch_slug
        run: |
          branch="${{ github.ref_name }}"
          slug="${branch//\//-}"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Upload cukes HTML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cukes-html-${{ steps.branch_slug.outputs.slug }}
          path: site/
          retention-days: 1

      - name: Fail if tests failed
        if: steps.cukes.outcome == 'failure'
        run: exit 1
