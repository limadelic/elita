name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Get dependencies
        run: mix deps.get

      - name: Format check
        run: mix format --check-formatted

      - name: Lint with credo
        id: credo
        run: mix credo --strict
        continue-on-error: true

      - name: Credo failure detail
        if: steps.credo.outcome == 'failure'
        run: |
          # Get detailed JSON output
          mix credo list --format json > /tmp/credo.json

          # Parse and create summary
          echo "## Lint Violations" >> $GITHUB_STEP_SUMMARY
          ISSUE_COUNT=$(jq '.issues | length' /tmp/credo.json)
          echo "Found $ISSUE_COUNT issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$ISSUE_COUNT" -gt 0 ]; then
            echo "| File | Line | Check | Message |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|-------|---------|" >> $GITHUB_STEP_SUMMARY

            jq -r '.issues[] | [.filename, .line_no, .check, .message] | @csv' /tmp/credo.json | while IFS=',' read -r file line check message; do
              file=$(echo "$file" | tr -d '"')
              check=$(echo "$check" | tr -d '"')
              message=$(echo "$message" | tr -d '"')

              # Emit GitHub annotation
              echo "::error file=$file,line=$line,title=$check::$message"

              # Add to summary table
              file_short=$(basename "$file")
              echo "| $file_short | $line | $check | $message |" >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Fail if credo had issues
        if: steps.credo.outcome == 'failure'
        run: exit 1

      - name: Generate lint badge
        run: |
          mkdir -p site
          ruby << 'RUBY'
            require 'json'
            if File.exist?('/tmp/credo.json')
              credo = JSON.parse(File.read('/tmp/credo.json'))
              issue_count = credo['issues'].length
            else
              issue_count = 0
            end
            color = issue_count == 0 ? '23D96C' : 'e05d44'
            message = issue_count == 0 ? 'clean' : "#{issue_count} issues"
            badge = {
              schemaVersion: 1,
              label: 'credo',
              message: message,
              color: color,
              labelColor: '173647'
            }
            File.write('site/lint.json', JSON.generate(badge))
          RUBY
        if: always()

      - name: Generate credo report
        run: |
          mkdir -p site
          ruby << 'RUBY'
            require 'json'
            html = <<~HTML
              <!DOCTYPE html>
              <html lang="en">
              <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1">
                <title>Credo Report</title>
                <style>
                  body { background: #1a1a1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; }
                  h1 { color: #fff; margin: 0 0 20px 0; }
                  .clean { color: #23D96C; font-size: 1.1em; margin: 20px 0; }
                  table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                  th { background: #173647; color: #fff; padding: 12px; text-align: left; border-bottom: 1px solid #444; font-weight: 600; }
                  td { padding: 12px; border-bottom: 1px solid #333; }
                  tr:hover { background: #2a2a2a; }
                </style>
              </head>
              <body>
            HTML

            if File.exist?('/tmp/credo.json')
              credo = JSON.parse(File.read('/tmp/credo.json'))
              issues = credo['issues'] || []
            else
              issues = []
            end

            if issues.empty?
              html << "<h1>credo</h1>\n<div class=\"clean\">✓ 0 issues — clean</div>\n"
            else
              html << "<h1>credo — #{issues.length} issues</h1>\n"
              html << "<table>\n<thead>\n<tr><th>File</th><th>Line</th><th>Check</th><th>Message</th></tr>\n</thead>\n<tbody>\n"
              issues.each do |issue|
                file = issue['filename'] || ''
                line = issue['line_no'] || ''
                check = issue['check'] || ''
                message = (issue['message'] || '').gsub(/&/, '&amp;').gsub(/</, '&lt;').gsub(/>/, '&gt;').gsub(/"/, '&quot;')
                html << "<tr><td>#{file}</td><td>#{line}</td><td>#{check}</td><td>#{message}</td></tr>\n"
              end
              html << "</tbody>\n</table>\n"
            end

            html << "</body>\n</html>"
            File.write('site/credo.html', html)
          RUBY
        if: always()

      - name: Upload lint badge artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-badge
          path: site/

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Get dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Test
        run: mix test

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [lint]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download lint badge
        uses: actions/download-artifact@v4
        with:
          name: lint-badge
          path: site

      - name: Preserve cucumber files
        run: |
          curl -sf https://limadelic.github.io/elita/cukes.json -o site/cukes.json || true
          curl -sf https://limadelic.github.io/elita/index.html -o site/index.html || true
          curl -sf https://limadelic.github.io/elita/cukes.html -o site/cukes.html || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
