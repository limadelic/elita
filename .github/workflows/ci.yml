name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Get dependencies
        run: mix deps.get

      - name: Lint
        id: lint
        run: mix lint

      - name: Check Gherkin formatting
        run: |
          npm install
          npm run fmt:check

      - name: Credo failure detail
        if: steps.lint.outcome == 'failure'
        run: |
          mix credo list --format json > /tmp/credo.json
          echo "## Lint Violations" >> $GITHUB_STEP_SUMMARY
          ISSUE_COUNT=$(jq '.issues | length' /tmp/credo.json)
          echo "Found $ISSUE_COUNT issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$ISSUE_COUNT" -gt 0 ]; then
            echo "| File | Line | Check | Message |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|-------|---------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.issues[] | [.filename, .line_no, .check, .message] | @csv' /tmp/credo.json | while IFS=',' read -r file line check message; do
              file=$(echo "$file" | tr -d '"')
              check=$(echo "$check" | tr -d '"')
              message=$(echo "$message" | tr -d '"')
              echo "::error file=$file,line=$line,title=$check::$message"
              file_short=$(basename "$file")
              echo "| $file_short | $line | $check | $message |" >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Fail if credo had issues
        if: steps.lint.outcome == 'failure'
        run: exit 1

      - run: bin/lint_badge.rb
        env:
          BRANCH: ${{ github.ref_name }}
        if: always()

      - run: bin/credo_report.rb
        env:
          BRANCH: ${{ github.ref_name }}
        if: always()

      - name: Upload lint badge artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-badge
          path: site/

  lock:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check config drift from lock baseline
        run: git diff --quiet 83f9450451defb72333e61ed83a51770a526f0db HEAD -- .credo.exs .githooks/ || { echo "config drift from lock baseline"; exit 1; }

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Get dependencies
        run: mix deps.get

      - name: Run tests
        run: mix test
        env:
          MIX_ENV: test

  cukes:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Get dependencies
        run: mix deps.get

      - name: Build el escript
        run: |
          cd apps/el
          mix escript.build

      - name: Prepare elita
        run: |
          cd apps/elita
          mix compile

      - name: Run Cucumber tests
        id: cukes
        run: |
          mkdir -p reports
          TAPE=replay mix cukes --format html --out reports/cucumber.html --format json --out reports/cucumber.json --publish-quiet
        env:
          MIX_ENV: test

      - name: Inject legend into report
        run: |
          ruby bin/inject_legend.rb reports/cucumber.html
        if: always()

      - run: bin/cukes_badge.rb
        env:
          BRANCH: ${{ github.ref_name }}
        if: always()

      - run: bin/cukes_summary.rb
        if: always()

      - run: ruby -e 'require "fileutils"; b = ENV["BRANCH"].sub(%r{/merge$}, ""); FileUtils.mkdir_p("site/#{b}"); FileUtils.cp("reports/cucumber.html", "site/#{b}/cukes.html")'
        env:
          BRANCH: ${{ github.ref_name }}
        if: always()
        name: Copy cucumber report to site

      - name: Upload Cucumber report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cukes-report-${{ github.run_id }}
          path: reports/

      - name: Sanitize branch name for artifact
        id: branch_slug
        run: |
          branch="${{ github.ref_name }}"
          slug="${branch//\//-}"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Upload cukes HTML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cukes-html-${{ steps.branch_slug.outputs.slug }}
          path: site/
          retention-days: 1

      - run: bin/update_pr_badge.rb
        if: github.event_name == 'pull_request' && always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.ref_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GH_TOKEN: ${{ github.token }}

      - name: Fail if tests failed
        if: steps.cukes.outcome == 'failure'
        run: exit 1

  site:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [lint, test, cukes, lock]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Compute deployment prefix
        id: prefix
        run: |
          BRANCH="${{ github.ref_name }}"
          PREFIX=""
          [ "$BRANCH" != "main" ] && PREFIX="$BRANCH/"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"

      - name: Sanitize branch name for artifact
        id: branch_slug
        run: |
          branch="${{ github.ref_name }}"
          slug="${branch//\//-}"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Create site directory
        run: mkdir -p site

      - name: Download lint badge artifact
        uses: actions/download-artifact@v4
        with:
          name: lint-badge
          path: site
        continue-on-error: true

      - name: Download cukes HTML artifact
        uses: actions/download-artifact@v4
        with:
          name: cukes-html-${{ steps.branch_slug.outputs.slug }}
          path: site/
        continue-on-error: true

      - name: Seed site from live Pages
        run: |
          PREFIX="${{ steps.prefix.outputs.prefix }}"
          mkdir -p site
          if [ -n "$PREFIX" ]; then
            curl -sfL https://limadelic.github.io/elita/index.html -o site/index.html || true
            curl -sfL https://limadelic.github.io/elita/cukes.json -o site/cukes.json || true
            curl -sfL https://limadelic.github.io/elita/cukes.html -o site/cukes.html || true
            curl -sfL https://limadelic.github.io/elita/lint.json -o site/lint.json || true
            curl -sfL https://limadelic.github.io/elita/credo.html -o site/credo.html || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
