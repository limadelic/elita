name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check config drift from lock baseline
        run: git diff --quiet 83f9450451defb72333e61ed83a51770a526f0db HEAD -- .credo.exs .githooks/ || { echo "config drift from lock baseline"; exit 1; }

  test:
    uses: ./.github/workflows/test.yml

  cukes:
    uses: ./.github/workflows/cukes.yml

  site:
    needs: [lint, test, cukes, lock]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/site.yml
