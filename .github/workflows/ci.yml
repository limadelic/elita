name: CI

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check config drift from lock baseline
        run: git diff --quiet b63ad21d5427c7dd0fcaf1115b85a6d7808309cb HEAD -- .credo.exs .githooks/ || { echo "config drift from lock baseline"; exit 1; }

  test:
    uses: ./.github/workflows/test.yml

  cukes:
    needs: [lint, test]
    uses: ./.github/workflows/cukes.yml

  site:
    needs: [lint, test, cukes, lock]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/site.yml
