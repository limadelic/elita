name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Get dependencies
        run: mix deps.get

      - name: Lint
        id: lint
        run: mix lint

      - name: Check Gherkin formatting
        run: |
          npm install
          npm run fmt:check

      - name: Credo failure detail
        if: steps.lint.outcome == 'failure'
        run: |
          # Get detailed JSON output
          mix credo list --format json > /tmp/credo.json

          # Parse and create summary
          echo "## Lint Violations" >> $GITHUB_STEP_SUMMARY
          ISSUE_COUNT=$(jq '.issues | length' /tmp/credo.json)
          echo "Found $ISSUE_COUNT issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$ISSUE_COUNT" -gt 0 ]; then
            echo "| File | Line | Check | Message |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|-------|---------|" >> $GITHUB_STEP_SUMMARY

            jq -r '.issues[] | [.filename, .line_no, .check, .message] | @csv' /tmp/credo.json | while IFS=',' read -r file line check message; do
              file=$(echo "$file" | tr -d '"')
              check=$(echo "$check" | tr -d '"')
              message=$(echo "$message" | tr -d '"')

              # Emit GitHub annotation
              echo "::error file=$file,line=$line,title=$check::$message"

              # Add to summary table
              file_short=$(basename "$file")
              echo "| $file_short | $line | $check | $message |" >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Fail if credo had issues
        if: steps.lint.outcome == 'failure'
        run: exit 1

      - name: Generate lint badge
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          mkdir -p "site/$branch"
          ruby << 'RUBY'
            require 'json'
            branch = ENV['BRANCH']
            if File.exist?('/tmp/credo.json')
              credo = JSON.parse(File.read('/tmp/credo.json'))
              issue_count = credo['issues'].length
            else
              issue_count = 0
            end
            color = issue_count == 0 ? '23D96C' : 'e05d44'
            message = issue_count == 0 ? 'clean' : "#{issue_count} issues"
            badge = {
              schemaVersion: 1,
              label: 'credo',
              message: message,
              color: color,
              labelColor: '173647'
            }
            File.write("site/#{branch}/lint.json", JSON.generate(badge))
          RUBY
        env:
          BRANCH: ${{ github.ref_name }}
        if: always()
        continue-on-error: true

      - name: Generate credo report
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          mkdir -p "site/$branch"
          ruby << 'RUBY'
            require 'json'
            branch = ENV['BRANCH']
            html = <<~HTML
              <!DOCTYPE html>
              <html lang="en">
              <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1">
                <title>Credo Report</title>
                <style>
                  body { background: #1a1a1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; }
                  h1 { color: #fff; margin: 0 0 20px 0; }
                  .clean { color: #23D96C; font-size: 1.1em; margin: 20px 0; }
                  table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                  th { background: #173647; color: #fff; padding: 12px; text-align: left; border-bottom: 1px solid #444; font-weight: 600; }
                  td { padding: 12px; border-bottom: 1px solid #333; }
                  tr:hover { background: #2a2a2a; }
                </style>
              </head>
              <body>
            HTML

            if File.exist?('/tmp/credo.json')
              credo = JSON.parse(File.read('/tmp/credo.json'))
              issues = credo['issues'] || []
            else
              issues = []
            end

            if issues.empty?
              html << "<h1>credo</h1>\n<div class=\"clean\">✓ 0 issues — clean</div>\n"
            else
              html << "<h1>credo — #{issues.length} issues</h1>\n"
              html << "<table>\n<thead>\n<tr><th>File</th><th>Line</th><th>Check</th><th>Message</th></tr>\n</thead>\n<tbody>\n"
              issues.each do |issue|
                file = issue['filename'] || ''
                line = issue['line_no'] || ''
                check = issue['check'] || ''
                message = (issue['message'] || '').gsub(/&/, '&amp;').gsub(/</, '&lt;').gsub(/>/, '&gt;').gsub(/"/, '&quot;')
                html << "<tr><td>#{file}</td><td>#{line}</td><td>#{check}</td><td>#{message}</td></tr>\n"
              end
              html << "</tbody>\n</table>\n"
            end

            html << "</body>\n</html>"
            File.write("site/#{branch}/credo.html", html)
          RUBY
        env:
          BRANCH: ${{ github.ref_name }}
        if: always()

      - name: Upload lint badge artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-badge
          path: site/

  lock:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check config drift from lock baseline
        run: git diff --quiet 83f9450451defb72333e61ed83a51770a526f0db HEAD -- .credo.exs .githooks/ || { echo "config drift from lock baseline"; exit 1; }

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Get dependencies
        run: mix deps.get

      - name: Run tests
        run: mix test
        env:
          MIX_ENV: test

  cukes:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Get dependencies
        run: mix deps.get

      - name: Build el escript
        run: |
          cd apps/el
          mix escript.build

      - name: Prepare elita
        run: |
          cd apps/elita
          mix compile

      - name: Run Cucumber tests
        id: cukes
        run: |
          mkdir -p reports
          TAPE=replay bundle exec cucumber --profile default --format html --out reports/cucumber.html --format json --out reports/cucumber.json --publish-quiet
        env:
          MIX_ENV: test

      - name: Compute badge counts
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          mkdir -p "site/$branch"
          ruby << 'RUBY'
            require 'json'
            branch = ENV['BRANCH']
            if File.exist?('reports/cucumber.json')
              data = JSON.parse(File.read('reports/cucumber.json'))
              scenarios = data.flat_map { |f| f['elements'] || [] }
              passed = scenarios.count { |sc| (sc['steps'] || []).all? { |s| s.dig('result','status') == 'passed' } }
              total = scenarios.length
              color = passed == total && total > 0 ? '23D96C' : 'e05d44'
              message = "#{passed}/#{total}"
            else
              color = 'e05d44'
              message = '0/0'
            end
            badge = {
              schemaVersion: 1,
              label: 'cukes',
              message: message,
              color: color,
              namedLogo: 'cucumber',
              logoColor: 'white',
              labelColor: '173647'
            }
            File.write("site/#{branch}/cukes.json", JSON.generate(badge))
            File.write("site/#{branch}/cukes_badge.txt", "cukes: #{message}")
          RUBY
        env:
          BRANCH: ${{ github.ref_name }}
        if: always()

      - name: Append summary
        run: |
          ruby << 'RUBY'
            require 'json'
            if File.exist?('reports/cucumber.json')
              data = JSON.parse(File.read('reports/cucumber.json'))
              scenarios = data.flat_map { |f| f['elements'] || [] }
              passed = scenarios.count { |sc| (sc['steps'] || []).all? { |s| s.dig('result','status') == 'passed' } }
              total = scenarios.length
              summary = "## Cucumber Tests\n\n✅ **#{passed}/#{total}** scenarios passed\n\n"
              data.each do |feature|
                feature_name = File.basename(feature['uri'])
                feature_scenarios = feature['elements'] || []
                feature_passed = feature_scenarios.count { |sc| (sc['steps'] || []).all? { |s| s.dig('result','status') == 'passed' } }
                summary << "- #{feature_name}: #{feature_passed}/#{feature_scenarios.length}\n"
              end
              File.write(ENV['GITHUB_STEP_SUMMARY'], summary)
            end
          RUBY
        if: always()
        shell: bash

      - name: Copy cucumber report to site
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          mkdir -p "site/$branch"
          cp reports/cucumber.html "site/$branch/cukes.html"
        if: always()

      - name: Upload Cucumber report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cukes-report-${{ github.run_id }}
          path: reports/

      - name: Upload cukes HTML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cukes-html-${{ github.ref_name }}
          path: site/

      - name: Update PR badge
        if: github.event_name == 'pull_request' && always()
        run: |
          ruby << 'RUBY'
            require 'json'
            require 'open3'
            require 'uri'

            branch = ENV['BRANCH']
            pages_url = "https://limadelic.github.io/elita"

            # Credo badge with endpoint URL
            credo_json_url = "#{pages_url}/#{branch}/lint.json"
            credo_json_encoded = URI.encode_www_form_component(credo_json_url)
            credo_report_url = "#{pages_url}/#{branch}/credo.html"
            credo_badge = "[![credo](https://img.shields.io/endpoint?url=#{credo_json_encoded})](#{credo_report_url})"

            # Cukes badge with endpoint URL
            cukes_json_url = "#{pages_url}/#{branch}/cukes.json"
            cukes_json_encoded = URI.encode_www_form_component(cukes_json_url)
            cukes_report_url = "#{pages_url}/#{branch}/cukes.html"
            cukes_badge = "[![cukes](https://img.shields.io/endpoint?url=#{cukes_json_encoded})](#{cukes_report_url})"

            badge_content = "#{credo_badge} #{cukes_badge}"

            # Get current PR body
            cmd = "gh pr view #{ENV['PR_NUMBER']} --json body -q .body"
            body, status = Open3.capture2(cmd)
            body = body.strip

            # Replace or append badge block
            marker_start = '<!-- cukes-badge-start -->'
            marker_end = '<!-- cukes-badge-end -->'

            if body.include?(marker_start) && body.include?(marker_end)
              body.gsub!(/#{Regexp.escape(marker_start)}.*?#{Regexp.escape(marker_end)}/m,
                        "#{marker_start}\n#{badge_content}\n#{marker_end}")
            else
              body = "#{marker_start}\n#{badge_content}\n#{marker_end}\n\n#{body}"
            end

            # Update PR body
            File.write('/tmp/pr_body.txt', body)
            system("gh pr edit #{ENV['PR_NUMBER']} --body-file /tmp/pr_body.txt")
          RUBY
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

      - name: Fail if tests failed
        if: steps.cukes.outcome == 'failure'
        run: exit 1

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [lint, test, cukes, lock]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Create site directory
        run: mkdir -p site

      - name: Download branch lint badge
        uses: actions/download-artifact@v4
        with:
          name: lint-badge
          path: site/${{ github.ref_name }}

      - name: Download branch cukes HTML
        uses: actions/download-artifact@v4
        with:
          name: cukes-html-${{ github.ref_name }}
          path: site/
        continue-on-error: true

      - name: Preserve main files
        if: github.ref != 'refs/heads/main'
        run: |
          mkdir -p site
          curl -sf https://limadelic.github.io/elita/cukes.json -o site/cukes.json || true
          curl -sf https://limadelic.github.io/elita/index.html -o site/index.html || true
          curl -sf https://limadelic.github.io/elita/cukes.html -o site/cukes.html || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
