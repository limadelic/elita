name: Site

on: workflow_call

permissions:
  pages: write
  id-token: write

jobs:
  site:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR number
        id: pr
        run: |
          BRANCH="${{ github.ref_name }}"
          PR_NUM=""
          if [ "$BRANCH" != "main" ] && [ "$BRANCH" != "test" ]; then
            echo "DEBUG: Resolving PR for branch $BRANCH" >&2
            PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>&1 || true)
            echo "DEBUG: PR result: PR_NUM=$PR_NUM" >&2
          fi
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute deployment prefix
        id: prefix
        run: |
          BRANCH="${{ github.ref_name }}"
          PR_NUM="${{ steps.pr.outputs.number }}"
          PREFIX=""
          if [ -n "$PR_NUM" ]; then
            PREFIX="$PR_NUM/"
          elif [ "$BRANCH" != "main" ]; then
            PREFIX="$BRANCH/"
          fi
          echo "DEBUG: BRANCH=$BRANCH PR_NUM=$PR_NUM PREFIX=$PREFIX" >&2
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "target=$PREFIX" >> "$GITHUB_OUTPUT"

      - name: Sanitize branch name for artifact
        id: branch_slug
        run: |
          branch="${{ github.ref_name }}"
          slug="${branch//\//-}"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Create site directory
        run: |
          mkdir -p site
          PREFIX="${{ steps.prefix.outputs.prefix }}"
          if [ -n "$PREFIX" ]; then
            mkdir -p "site/$PREFIX"
          fi

      - name: Merge previous github-pages artifact as base
        run: |
          set +e
          ARTIFACT_ID=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --paginate --jq '.artifacts[] | select(.name == "github-pages") | .id' | head -1)

          if [ -z "$ARTIFACT_ID" ]; then
            echo "No previous github-pages artifact found, starting empty"
            exit 0
          fi

          echo "Found artifact $ARTIFACT_ID, downloading..."
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR"
          gh api repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip -H "Accept: application/zip" > artifact.zip
          unzip -q artifact.zip

          if [ -f artifact.tar ]; then
            tar xf artifact.tar -C /tmp
            if [ -d /tmp/artifact ]; then
              cp -r /tmp/artifact/* "$GITHUB_WORKSPACE/site/" 2>/dev/null || true
              echo "Base merged from previous deploy"
            fi
          fi

          rm -rf "$TEMP_DIR"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download lint badge artifact
        uses: actions/download-artifact@v4
        with:
          name: lint-badge
          path: site/${{ steps.prefix.outputs.prefix }}
        continue-on-error: true

      - name: Download cukes HTML artifact
        uses: actions/download-artifact@v4
        with:
          name: cukes-html-${{ steps.branch_slug.outputs.slug }}
          path: site/${{ steps.prefix.outputs.prefix }}
        continue-on-error: true

      - name: Place report in prefix directory
        run: |
          PREFIX="${{ steps.prefix.outputs.prefix }}"
          if [ -n "$PREFIX" ]; then
            mkdir -p "site/$PREFIX"
            # Move any root level report files to the prefix directory if they exist
            for file in report.html cukes.html cukes.json lint.json credo.html; do
              [ -f "site/$file" ] && mv "site/$file" "site/$PREFIX$file" 2>/dev/null || true
            done
          fi
        continue-on-error: true

      - name: Seed site from live Pages
        run: |
          mkdir -p site
          BASE_URL="https://limadelic.github.io/elita"
          FILES="report.html cukes.html cukes.json lint.json credo.html index.html"

          # Seed root files
          for file in $FILES; do
            curl -sfL "$BASE_URL/$file" -o "site/$file" || true
          done

          # Get branch names from git remote branches
          BRANCHES=$(git branch -r | sed 's/^[[:space:]]*origin\///' | grep -v '^HEAD' | sort -u)

          # Seed each branch directory
          for branch in $BRANCHES; do
            mkdir -p "site/$branch"
            for file in $FILES; do
              curl -sfL "$BASE_URL/$branch/$file" -o "site/$branch/$file" || true
            done
          done

          # Seed numeric PR directories (discover from live site)
          for pr_num in $(seq 1 100); do
            curl -sfL "$BASE_URL/$pr_num/report.html" -o /dev/null 2>/dev/null && {
              mkdir -p "site/$pr_num"
              for file in $FILES; do
                curl -sfL "$BASE_URL/$pr_num/$file" -o "site/$pr_num/$file" || true
              done
            } || true
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
