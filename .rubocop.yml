AllCops:
  TargetRubyVersion: 3.0
  NewCops: disable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - 'deps/**/*'
    - '_build/**/*'
    - 'tmp/**/*'

# BlockNesting: allow up to 3 levels (while + synchronize + if)
Metrics/BlockNesting:
  Max: 3

# Other Metrics: generous ceilings, just above current worst offenders
Metrics/MethodLength:
  Max: 30
  CountAsOne:
    - array
    - hash
    - heredoc
    - method_call
  Exclude:
    - 'features/step_definitions/**/*'

Metrics/CyclomaticComplexity:
  Max: 20

Metrics/PerceivedComplexity:
  Max: 20

Metrics/AbcSize:
  Max: 35

Metrics/ClassLength:
  Max: 150

Metrics/ModuleLength:
  Max: 180

Metrics/BlockLength:
  Enabled: false

Metrics/ParameterLists:
  Enabled: false

# Style cops: disable noise (docs, frozen string literals, quote preference)
Style:
  Enabled: false

# Layout: relax noise, keep basics enabled
Layout:
  Enabled: true

Layout/LineLength:
  Max: 120

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

Layout/MultilineOperationIndentation:
  EnforcedStyle: indented

Layout/ArgumentAlignment:
  EnforcedStyle: with_fixed_indentation

Layout/ParameterAlignment:
  EnforcedStyle: with_fixed_indentation

Layout/ArrayAlignment:
  EnforcedStyle: with_fixed_indentation

Layout/HashAlignment:
  EnforcedHashRocketStyle: key
  EnforcedColonStyle: key

Layout/FirstArgumentIndentation:
  EnforcedStyle: consistent

Layout/FirstParameterIndentation:
  EnforcedStyle: consistent

Layout/FirstHashElementIndentation:
  EnforcedStyle: consistent

Layout/FirstArrayElementIndentation:
  EnforcedStyle: consistent

Layout/MultilineHashBraceLayout:
  EnforcedStyle: new_line

Layout/MultilineArrayBraceLayout:
  EnforcedStyle: new_line

Layout/MultilineMethodCallBraceLayout:
  EnforcedStyle: new_line

Layout/FirstHashElementLineBreak:
  Enabled: true

Layout/FirstArrayElementLineBreak:
  Enabled: true

Layout/FirstMethodArgumentLineBreak:
  Enabled: true

Naming/FileName:
  Enabled: true
  ExpectMatchingDefinition: true
  CheckDefinitionPathHierarchy: true
  CheckDefinitionPathHierarchyRoots:
    - lib
  Exclude:
    - 'bin/**/*'
    - 'features/step_definitions/**/*'
    - 'tmp/**/*'

Lint/SuppressedException:
  Enabled: false

Lint:
  Enabled: true

Naming/MethodParameterName:
  Enabled: false

Metrics:
  Enabled: true

Gemspec:
  Enabled: false
