# Index configuration for elita session logs
# Location: $SPLUNK_HOME/etc/apps/elita_session/local/indexes.conf

[elita]
# Index name for elita session logs
maxTotalDataSizeMB = 500
# Retention: 1 day (86400 seconds)
frozenTimePeriodInSecs = 86400
# Splunk will delete data older than 1 day
# Set when data should be moved to cold storage
coldToFrozenDir = $SPLUNK_HOME/var/lib/splunk/elita/frozendb
coldToFrozenScript = $SPLUNK_HOME/bin/splunk cmd mkversion $longid -o $path
# Make sure raw data is available
enableTsidxReduction = false
